<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自动盯盘Agent · 实时终端</title>
<style>
:root {
  --bg-primary: #0a0e14;
  --bg-secondary: #12161e;
  --bg-card: #1a1f2b;
  --border: #252b36;
  --text-primary: #c9d1d9;
  --text-secondary: #8b949e;
  --text-muted: #555d66;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d2991d;
  --purple: #a371f7;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  font-size: 13px;
}

/* ====== Header ====== */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-left h1 { font-size:14px; font-weight:600; color:var(--accent); letter-spacing:0.5px; }
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
.logo-dot.off { background:var(--red); }
.header-right { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--text-secondary); }
.stat-item { display:flex; align-items:center; gap:4px; }
.stat-val { color:var(--text-primary); font-weight:600; }
.ws-status { font-size:11px; padding:2px 8px; border-radius:10px; }
.ws-status.on { background:#23863620; color:var(--green); }
.ws-status.off { background:#f8514920; color:var(--red); }

/* ====== Layout ====== */
.layout { display:flex; height:calc(100vh - 44px); }
.panel { padding:12px; overflow-y:auto; }
.panel-left { width:280px; flex-shrink:0; border-right:1px solid var(--border); background:var(--bg-secondary); }
.panel-center { flex:1; display:flex; flex-direction:column; }
.panel-right { width:340px; flex-shrink:0; border-left:1px solid var(--border); background:var(--bg-secondary); }

/* ====== Cards ====== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 10px;
}
.card-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 12px; border-bottom:1px solid var(--border);
  font-size:12px; font-weight:600; color:var(--text-secondary);
}
.card-body { padding:0; }

/* ====== Stock List ====== */
.stock-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 12px; cursor:pointer; transition:background .15s;
  border-bottom:1px solid var(--border);
}
.stock-row:hover { background:rgba(88,166,255,0.05); }
.stock-row .name { flex:2; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stock-row .price-col { flex:1; text-align:right; font-variant-numeric:tabular-nums; }
.stock-row .change-col { flex:1; text-align:right; font-weight:500; font-variant-numeric:tabular-nums; }
.up { color:var(--red); }
.down { color:var(--green); }
.flat { color:var(--text-muted); }

/* ====== Alert Timeline ====== */
.alert-feed { flex:1; overflow-y:auto; padding:8px; }
.alert-item {
  padding:10px 12px; margin-bottom:6px; border-radius:6px;
  border-left:3px solid var(--border); background:var(--bg-card);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.alert-item.risk { border-left-color:var(--red); background:#f8514908; }
.alert-item.opportunity { border-left-color:var(--green); background:#3fb95008; }
.alert-item.info { border-left-color:var(--accent); background:#58a6ff08; }
.alert-item .alert-header { display:flex; justify-content:space-between; margin-bottom:4px; }
.alert-item .alert-title { font-weight:600; font-size:13px; }
.alert-item .alert-time { font-size:11px; color:var(--text-muted); }
.alert-item .alert-detail { font-size:12px; color:var(--text-secondary); line-height:1.5; }
.alert-item .alert-rule { font-size:10px; color:var(--text-muted); margin-top:4px; }
.alert-empty { text-align:center; padding:40px 20px; color:var(--text-muted); }
.alert-empty .icon { font-size:32px; margin-bottom:8px; }

/* ====== News ====== */
.news-item {
  padding:6px 12px; border-bottom:1px solid var(--border); cursor:pointer;
  font-size:12px; line-height:1.5; transition:background .15s;
}
.news-item:hover { background:rgba(88,166,255,0.05); }
.news-source { font-size:10px; color:var(--text-muted); }
.sentiment-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; }
.sentiment-dot.pos { background:var(--red); }
.sentiment-dot.neg { background:var(--green); }
.sentiment-dot.neutral { background:var(--text-muted); }

/* ====== Market Stats ====== */
.stats-row { display:flex; gap:8px; padding:8px 12px; }
.stat-box { flex:1; text-align:center; padding:8px 4px; background:rgba(0,0,0,0.2); border-radius:4px; }
.stat-box .val { font-size:16px; font-weight:700; }
.stat-box .lbl { font-size:10px; color:var(--text-muted); margin-top:2px; }

/* ====== Section Title ====== */
.section-title {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 12px 6px; font-size:11px; font-weight:600;
  color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;
}
.section-count { color:var(--accent); }

/* ====== Scrollbar ====== */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

/* ====== Tabs ====== */
.tabs { display:flex; border-bottom:1px solid var(--border); }
.tab {
  flex:1; text-align:center; padding:8px; font-size:12px; cursor:pointer;
  color:var(--text-muted); transition:all .15s; border-bottom:2px solid transparent;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab:hover { color:var(--text-primary); }

/* ====== Badge ====== */
.badge {
  display:inline-block; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:600;
}
.badge-risk { background:#f8514920; color:var(--red); }
.badge-opp { background:#3fb95020; color:var(--green); }
.badge-info { background:#58a6ff20; color:var(--accent); }

/* ====== Price Flash ====== */
.flash-up { animation: flashUp .6s ease; }
.flash-down { animation: flashDown .6s ease; }
@keyframes flashUp { 0% { background:rgba(231,76,60,0.3); } 100% { background:transparent; } }
@keyframes flashDown { 0% { background:rgba(39,174,96,0.3); } 100% { background:transparent; } }
</style>
</head>
<body>

<!-- ====== Header ====== -->
<div class="header">
  <div class="header-left">
    <div class="logo-dot" id="logo-dot"></div>
    <h1>盯盘终端</h1>
  </div>
  <div class="header-right">
    <span class="stat-item">告警<span class="stat-val" id="hdr-alerts">0</span></span>
    <span class="stat-item">连接<span class="ws-status on" id="ws-status">● LIVE</span></span>
    <span style="color:var(--text-muted)" id="hdr-time">--</span>
  </div>
</div>

<!-- ====== Layout ====== -->
<div class="layout">
  <!-- Left: Watchlist -->
  <div class="panel panel-left" id="left-panel">
    <div class="section-title">
      <span>📈 自选监控</span>
      <span class="section-count" id="stock-count">15只</span>
    </div>
    <div class="card" style="margin-bottom:6px;">
      <div class="stats-row">
        <div class="stat-box"><div class="val up" id="st-up">0</div><div class="lbl">上涨</div></div>
        <div class="stat-box"><div class="val down" id="st-down">0</div><div class="lbl">下跌</div></div>
        <div class="stat-box"><div class="val" id="st-flat" style="color:var(--text-muted)">0</div><div class="lbl">平盘</div></div>
      </div>
    </div>
    <div id="stock-list"></div>
  </div>

  <!-- Center: Alert Timeline -->
  <div class="panel panel-center">
    <div class="tabs">
      <div class="tab active" data-filter="all" onclick="filterAlerts('all', this)">全部</div>
      <div class="tab" data-filter="risk" onclick="filterAlerts('risk', this)">🔴 风险</div>
      <div class="tab" data-filter="opportunity" onclick="filterAlerts('opportunity', this)">🟢 机会</div>
      <div class="tab" data-filter="info" onclick="filterAlerts('info', this)">🔵 信息</div>
    </div>
    <div class="alert-feed" id="alert-feed">
      <div class="alert-empty">
        <div class="icon">🔔</div>
        <div>等待告警触发...</div>
        <div style="font-size:11px;margin-top:4px;">交易时段自动监控 · 当前非交易时间</div>
      </div>
    </div>
  </div>

  <!-- Right: News + Market -->
  <div class="panel panel-right" id="right-panel">
    <div class="section-title">
      <span>📰 新闻快讯</span>
      <span class="section-count" id="news-count">0条</span>
    </div>
    <div class="card" style="max-height:50%;overflow-y:auto;">
      <div class="card-body" id="news-list">
        <div class="news-item" style="color:var(--text-muted)">加载中...</div>
      </div>
    </div>
    <div class="section-title">
      <span>📊 市场状态</span>
    </div>
    <div class="card">
      <div class="card-body" style="padding:12px;" id="market-info">加载中...</div>
    </div>
  </div>
</div>

<script>
// ====== State ======
const API = '/api';
let ws = null;
let wsReconnectTimer = null;
let alertFilter = 'all';
let alertCache = [];
let lastQuoteData = {};

// ====== WebSocket ======
function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-status').innerHTML = '● LIVE';
    document.getElementById('ws-status').className = 'ws-status on';
    document.getElementById('logo-dot').className = 'logo-dot';
    clearTimeout(wsReconnectTimer);
    console.log('WebSocket connected');
  };

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleWSMessage(msg);
    } catch(e) { console.error('WS parse error:', e); }
  };

  ws.onclose = () => {
    document.getElementById('ws-status').innerHTML = '● OFF';
    document.getElementById('ws-status').className = 'ws-status off';
    document.getElementById('logo-dot').className = 'logo-dot off';
    wsReconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

function handleWSMessage(msg) {
  switch(msg.type) {
    case 'alert':
      addAlertToFeed(msg.data);
      showNotification(msg.data);
      break;
    case 'quotes':
      updateQuotesFromWS(msg.data);
      break;
    case 'connected':
      console.log('WS:', msg.data.message);
      break;
  }
}

// ====== Quotes Update (WebSocket push) ======
function updateQuotesFromWS(data) {
  const quotes = data.quotes || {};
  const rows = document.querySelectorAll('.stock-row');
  rows.forEach(row => {
    const code = row.dataset.code;
    const q = quotes[code];
    if (!q) return;
    const priceEl = row.querySelector('.price-col');
    const changeEl = row.querySelector('.change-col');
    const oldPrice = parseFloat(row.dataset.price || 0);
    const newPrice = q.price;

    row.dataset.price = newPrice;
    priceEl.textContent = '¥' + newPrice.toFixed(2);

    const cls = q.change_pct > 0 ? 'up' : q.change_pct < 0 ? 'down' : 'flat';
    const sign = q.change_pct > 0 ? '+' : '';
    changeEl.textContent = sign + q.change_pct.toFixed(2) + '%';
    changeEl.className = 'change-col ' + cls;

    // Price flash animation
    if (oldPrice > 0 && newPrice !== oldPrice) {
      row.classList.remove('flash-up', 'flash-down');
      void row.offsetWidth;
      row.classList.add(newPrice > oldPrice ? 'flash-up' : 'flash-down');
    }
  });

  // Update market session
  const session = data.market_session;
  const statusText = session === 'morning' || session === 'afternoon' ? '交易中' :
                     session === 'auction' ? '集合竞价' :
                     session === 'lunch' ? '午休' : '休市';
  document.getElementById('hdr-time').textContent = statusText;

  // Update up/down counts
  let up = 0, down = 0;
  for (const q of Object.values(quotes)) {
    if (q.change_pct > 0) up++;
    else if (q.change_pct < 0) down++;
  }
  document.getElementById('st-up').textContent = up;
  document.getElementById('st-down').textContent = down;
  document.getElementById('st-flat').textContent = Object.keys(quotes).length - up - down;
}

// ====== Alert Feed ======
function addAlertToFeed(alert) {
  alertCache.unshift(alert);
  if (alertCache.length > 200) alertCache.pop();
  if (alertFilter !== 'all' && alert.category !== alertFilter) return;
  renderAlerts();
}

function filterAlerts(filter, el) {
  alertFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAlerts();
}

function renderAlerts() {
  const container = document.getElementById('alert-feed');
  const filtered = alertFilter === 'all' ? alertCache : alertCache.filter(a => a.category === alertFilter);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="alert-empty"><div class="icon">🔔</div><div>暂无${alertFilter === 'all' ? '' : '此类'}告警</div></div>`;
    return;
  }

  container.innerHTML = filtered.map(a => {
    const catBadge = a.category === 'risk' ? '<span class="badge badge-risk">风险</span>' :
                     a.category === 'opportunity' ? '<span class="badge badge-opp">机会</span>' :
                     '<span class="badge badge-info">信息</span>';
    return `<div class="alert-item ${a.category}">
      <div class="alert-header">
        <span class="alert-title">${catBadge} ${a.title || ''}</span>
        <span class="alert-time">${(a.alert_at || '').substring(11, 19) || ''}</span>
      </div>
      <div class="alert-detail">${(a.detail || '').replace(/\n/g, '<br>')}</div>
      <div class="alert-rule">规则: ${a.rule_id || ''} | ${a.stock_name || a.stock_code || ''}</div>
    </div>`;
  }).join('');

  // Also update alert count
  document.getElementById('hdr-alerts').textContent = alertCache.length;
}

// ====== Desktop Notification ======
function showNotification(alert) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    const n = new Notification(alert.title || '盯盘告警', {
      body: (alert.detail || '').substring(0, 150).replace(/\n/g, ' '),
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="%23' + (alert.category==='risk'?'f85149':'3fb950') + '"/><text x="16" y="21" text-anchor="middle" font-size="16" fill="white">!</text></svg>',
      tag: 'stock-alert',
      requireInteraction: alert.category === 'risk',
    });
    setTimeout(() => n.close(), 8000);
  } catch(e) {}
}

function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ====== API Data Loading ======
async function loadWatchlist() {
  try {
    const r = await (await fetch(API+'/watchlist')).json();
    const container = document.getElementById('stock-list');
    document.getElementById('stock-count').textContent = (r.stocks||[]).length + '只';
    container.innerHTML = (r.stocks || []).map(s => {
      const pct = s.change_pct || 0;
      const cls = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
      const sign = pct > 0 ? '+' : '';
      return `<div class="stock-row" data-code="${s.code}" data-price="${s.price||0}">
        <span class="name" title="${s.name}(${s.code})">${s.name || s.code}</span>
        <span class="price-col">¥${(s.price || 0).toFixed(2)}</span>
        <span class="change-col ${cls}">${sign}${pct.toFixed(2)}%</span>
      </div>`;
    }).join('');
  } catch(e) { console.error('Watchlist load error:', e); }
}

async function loadNews() {
  try {
    const r = await (await fetch(API+'/news?limit=12')).json();
    document.getElementById('news-count').textContent = (r.news||[]).length + '条';
    const container = document.getElementById('news-list');
    if (!r.news || r.news.length === 0) {
      container.innerHTML = '<div class="news-item" style="color:var(--text-muted)">暂无新闻</div>';
      return;
    }
    container.innerHTML = r.news.map(n => {
      const sent = n._sentiment || {};
      const dotCls = sent.sentiment === 'positive' ? 'pos' : sent.sentiment === 'negative' ? 'neg' : 'neutral';
      return `<div class="news-item">
        <span class="sentiment-dot ${dotCls}"></span>
        ${(n.title || '').substring(0, 100)}
        <div class="news-source">${n.source || ''} · ${(n.pub_time || '').substring(0, 16)}</div>
      </div>`;
    }).join('');
  } catch(e) { console.error('News load error:', e); }
}

async function loadStatus() {
  try {
    const r = await (await fetch(API+'/status')).json();
    document.getElementById('market-info').innerHTML = `
      <div style="font-size:13px;line-height:2;">
        <div>⏱ 运行时间: <strong>${Math.floor((r.uptime_seconds||0)/60)}分钟</strong></div>
        <div>📅 交易日: <strong style="color:${r.today_is_trading_day?'var(--green)':'var(--red)'}">${r.today_is_trading_day?'是':'否'}</strong></div>
        <div>🕐 当前时段: <strong>${r.market_session}</strong></div>
        <div>🔌 WebSocket: <strong>${r.ws_connections||0}</strong> 连接</div>
        <div>📊 行情刷新: <strong>${r.stats.quotes_fetched||0}</strong> 次</div>
        <div>📰 新闻拉取: <strong>${r.stats.news_fetched||0}</strong> 条</div>
      </div>`;
  } catch(e) {}
}

async function loadAlerts() {
  try {
    const r = await (await fetch(API+'/alerts?limit=30')).json();
    if (r.alerts && r.alerts.length > 0) {
      for (const a of r.alerts.reverse()) {
        if (!alertCache.find(x => x.id === a.id)) {
          alertCache.push(a);
        }
      }
      if (alertCache.length > 200) alertCache = alertCache.slice(-200);
      renderAlerts();
    }
  } catch(e) {}
}

// ====== Periodic Refresh (API fallback) ======
function refreshAPI() {
  loadNews();
  loadStatus();
}

// ====== Init ======
async function init() {
  await loadWatchlist();
  await loadAlerts();
  await loadNews();
  await loadStatus();
  connectWS();
  requestNotificationPermission();
  setInterval(refreshAPI, 15000);
  document.getElementById('hdr-time').textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  setInterval(() => {
    document.getElementById('hdr-time').textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  }, 30000);
}

init();
</script>
</body>
</html>
